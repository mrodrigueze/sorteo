<!DOCTYPE html>
<html>
<head>
  <title>Formulario</title>
</head>
<body>

<h2>Compra de Tickets</h2>

<form id="form">
  <input type="text" id="nombre" placeholder="Nombre" required><br><br>
  <input type="text" id="celular" placeholder="Celular" required><br><br>
  <input type="number" id="tickets" placeholder="Número de tickets" required><br><br>
  <button type="submit">Enviar</button>
</form>

<p id="msg"></p>

<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  fetch("TU_URL_DE_APPS_SCRIPT", {
    method: "POST",
    body: JSON.stringify({
      nombre: document.getElementById("nombre").value,
      celular: document.getElementById("celular").value,
      tickets: document.getElementById("tickets").value
    })
  })
  .then(res => res.text())
  .then(() => {
    document.getElementById("msg").innerText = "Datos enviados";
  });
});
</script>

</body>
</html>
