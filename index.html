<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rifa 2026</title>

  <!-- Fix de cache: el navegador siempre verificará si hay una versión nueva -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f3; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 14px; padding: 2rem; width: 100%; max-width: 420px; }
    .header { text-align: center; margin-bottom: 2rem; }
    .icon { width: 48px; height: 48px; background: #e6f1fb; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 20px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #888; }
    .field { margin-bottom: 1.25rem; }
    label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 12px; font-size: 15px; background: #fafafa; border: 1px solid #ddd; border-radius: 8px; color: #111; transition: border-color 0.15s; }
    input:focus { outline: none; border-color: #185FA5; box-shadow: 0 0 0 3px rgba(24,95,165,0.1); }
    .btn { width: 100%; padding: 12px; font-size: 15px; font-weight: 600; background: #185FA5; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
    .btn:hover { background: #0C447C; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { margin-top: 1rem; padding: 12px; border-radius: 8px; font-size: 14px; display: none; }
    .msg.ok { background: #EAF3DE; color: #3B6D11; display: block; }
    .msg.err { background: #FCEBEB; color: #A32D2D; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="icon">🎟️</div>
      <h1>Compra de Tickets</h1>
      <p class="subtitle">Completa el formulario para reservar tus entradas</p>
    </div>

    <form id="form">
      <div class="field">
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" placeholder="Tu nombre" required>
      </div>
      <div class="field">
        <label for="celular">Celular</label>
        <input type="tel" id="celular" placeholder="+51 999 999 999" required>
      </div>
      <div class="field">
        <label for="tickets">Número de tickets</label>
        <input type="number" id="tickets" placeholder="1" min="1" required>
      </div>
      <button type="submit" class="btn" id="btn">Enviar solicitud</button>
    </form>

    <div class="msg" id="msg"></div>
  </div>

  <script>
    document.getElementById("form").addEventListener("submit", async function(e) {
      e.preventDefault();
      const btn = document.getElementById("btn");
      const msg = document.getElementById("msg");

      btn.disabled = true;
      btn.textContent = "Enviando...";
      msg.className = "msg";

      try {
        await fetch("https://script.google.com/macros/s/AKfycbwT41GGhbEYXIdCkj-sZsm1zCRSGihhgEKkI2x2zVEFTKopgpRgaBpPXm4xGwpQOVBa2w/exec", {
          method: "POST",
          body: JSON.stringify({
            nombre: document.getElementById("nombre").value,
            celular: document.getElementById("celular").value,
            tickets: document.getElementById("tickets").value
          })
        });
        msg.textContent = "¡Listo! Tus datos fueron enviados correctamente.";
        msg.className = "msg ok";
        document.getElementById("form").reset();
      } catch {
        msg.textContent = "Ocurrió un error. Por favor intenta nuevamente.";
        msg.className = "msg err";
      }

      btn.disabled = false;
      btn.textContent = "Enviar solicitud";
    });
  </script>
</body>
</html>
