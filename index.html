<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<!DOCTYPE html>
<html>
<head>
  <title>Formulario</title>
</head>
<body>

<h2>Compra de Tickets</h2>

<form id="form">
  <input type="text" id="nombre" placeholder="Nombre" required><br><br>
  <input type="text" id="celular" placeholder="Celular" required><br><br>
  <input type="number" id="tickets" placeholder="Número de tickets" required><br><br>
  <button type="submit">Enviar</button>
</form>

<p id="msg"></p>

<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  fetch("https://script.google.com/macros/s/AKfycbwT41GGhbEYXIdCkj-sZsm1zCRSGihhgEKkI2x2zVEFTKopgpRgaBpPXm4xGwpQOVBa2w/exec", {
    method: "POST",
    body: JSON.stringify({
      nombre: document.getElementById("nombre").value,
      celular: document.getElementById("celular").value,
      tickets: document.getElementById("tickets").value
    })
  })
  .then(res => res.text())
  .then(() => {
    document.getElementById("msg").innerText = "Datos enviados";
  });
});
</script>

</body>
</html>
