<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rifa</title>
  <style>
    :root { --p: #0f4c81; --bg: #f4f6f8; --card: #ffffff; --text: #2c3e50; --border: #e2e8f0; --ok: #10b981; --err: #ef4444; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 2rem; display: flex; justify-content: center; }
    .layout { display: grid; grid-template-columns: 1.5fr 1fr; gap: 1.5rem; max-width: 1200px; width: 100%; align-items: start; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    h1, h2, h3 { color: var(--p); margin: 0 0 1rem 0; }
    h1, h2 { font-size: 1.1rem; border-bottom: 2px solid var(--bg); padding-bottom: 0.5rem; }
    h3 { font-size: 0.9rem; margin-bottom: 0.5rem; }
    
    .table-header { display: grid; grid-template-columns: 2fr 1.5fr 1fr 2fr; gap: 10px; font-size: 0.8rem; font-weight: bold; color: #64748b; margin-bottom: 0.5rem; }
    .form-row { display: grid; grid-template-columns: 2fr 1.5fr 1fr 2fr; gap: 10px; margin-bottom: 10px; align-items: start; }
    .mobile-label { display: none; font-size: 0.75rem; font-weight: bold; color: var(--p); margin-bottom: 4px; }
    
    input { width: 100%; padding: 0.6rem; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem; outline: none; box-sizing: border-box; transition: border-color 0.2s; }
    input:focus { border-color: var(--p); }
    input:disabled { background: #f8fafc; color: #94a3b8; }
    
    .btn-add { background: transparent; color: var(--p); border: 1px dashed var(--p); padding: 0.6rem; width: 100%; border-radius: 6px; cursor: pointer; font-size: 0.9rem; margin-bottom: 1.5rem; transition: background 0.2s; }
    .btn-add:hover { background: #f0f6fc; }
    .btn-submit { background: var(--p); color: white; border: none; padding: 0.8rem; width: 100%; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: opacity 0.2s; }
    .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }
    .btn-del { background: #fee2e2; color: #991b1b; border: none; border-radius: 6px; padding: 0 12px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; height: 100%; }
    .btn-del:hover { opacity: 0.8; }
    
    .progress-container { width: 100%; background: var(--border); border-radius: 6px; overflow: hidden; margin: 0.5rem 0; position: relative; height: 24px; }
    .progress-bar { height: 100%; background: #f59e0b; width: 0%; text-align: center; color: white; font-size: 0.8rem; line-height: 24px; transition: 0.4s; font-weight: bold; }
    .progress-bar.success { background: var(--ok); }
    .marker { position: absolute; left: 40%; top: 0; bottom: 0; width: 2px; background: rgba(0,0,0,0.3); z-index: 10; }
    
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1rem; }
    .stat-box { background: var(--bg); padding: 1rem; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
    .stat-val { font-size: 1.5rem; font-weight: bold; color: var(--p); }
    .stat-lbl { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
    
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid var(--border); }
    .scrollable { max-height: 200px; overflow-y: auto; margin-bottom: 1rem; }
    
    .msg { margin-top: 1rem; padding: 0.8rem; border-radius: 6px; font-size: 0.9rem; display: none; text-align: center; }
    .msg.ok { display: block; background: #d1fae5; color: #065f46; }
    .msg.err { display: block; background: #fee2e2; color: #991b1b; }
    .info-text { font-size: 0.75rem; color: var(--p); display: block; margin-top: 4px; min-height: 14px; }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      body { padding: 1rem; }
      .table-header { display: none; }
      .form-row { display: flex; flex-direction: column; gap: 5px; border-bottom: 1px dashed var(--border); padding-bottom: 1rem; }
      .mobile-label { display: block; }
    }
  </style>
</head>
<body>

  <div class="layout">
    <div class="card">
      <h1>🎟️ Registro Rápido</h1>
      <div class="table-header">
        <div>Nombres Completos</div>
        <div>Celular</div>
        <div>N° Tickets</div>
        <div>Referencia (Número)</div>
      </div>
      
      <form id="form">
        <div id="rowContainer">
          <div class="form-row">
            <div><label class="mobile-label">Nombres Completos</label><input type="text" class="i-nom" placeholder="Ej: Juan Pérez" required></div>
            <div><label class="mobile-label">Celular</label><input type="tel" class="i-cel" placeholder="Ej: 987654321" required><span class="info-text"></span></div>
            <div><label class="mobile-label">N° Tickets</label><input type="number" class="i-tkt" min="1" placeholder="Ej: 5" required></div>
            <div><label class="mobile-label">Referencia (Número)</label><input type="text" class="i-ref" list="listaRefs" placeholder="Opcional" autocomplete="off"></div>
          </div>
        </div>
        
        <datalist id="listaRefs"></datalist>
        <button type="button" class="btn-add" id="btnAddRow">+ Añadir otro participante</button>
        <button type="submit" class="btn-submit" id="btn">Procesar Registros</button>
      </form>
      <p id="msg" class="msg"></p>
    </div>

    <div style="display: flex; flex-direction: column; gap: 1.5rem;">
      <div class="card">
        <h2>Avance de Meta</h2>
        <div class="progress-container">
          <div class="marker" title="Mínimo 2000"></div>
          <div id="progressBar" class="progress-bar">0%</div>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 0.8rem; color: #64748b;">
          <span>Vendidos: <strong id="tVendidos" style="color:var(--text)">0</strong></span>
          <span>Total(Inc.Extra): <strong id="tTotal" style="color:var(--text)">0</strong></span>
          <span>Meta: <strong style="color:var(--text)">5000</strong></span>
        </div>
        <div class="stats-grid">
          <div class="stat-box"><div class="stat-val" id="kDinero">S/ 0</div><div class="stat-lbl">Recaudado</div></div>
          <div class="stat-box"><div class="stat-val" id="kPart">0</div><div class="stat-lbl">Participantes</div></div>
        </div>
      </div>

      <div class="card">
        <h2>Últimos Movimientos</h2>
        <div class="scrollable">
          <table id="tblMovs"><tbody></tbody></table>
        </div>
        
        <h2>TOP 3</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div>
            <h3>Top Participantes</h3>
            <table id="tblParts"><tbody></tbody></table>
          </div>
          <div>
            <h3>Top Referidores</h3>
            <table id="tblRefs"><tbody></tbody></table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbxzw0P1WQeICoO1Jj50WramN9rb2eDcOFADB0NmxqTjxvht_zHcOfWQWGUh7OtWUPB4JQ/exec"; // ¡REEMPLAZAR!
    let bdParticipantes = []; 

    function renderDashboard(data) {
      if (!data || !data.kpis) return;
      bdParticipantes = data.lista || [];
      
      const vendidos = data.kpis.tickets_v || 0;
      const pct = Math.min((vendidos / 5000) * 100, 100).toFixed(1);
      const pBar = document.getElementById("progressBar");
      
      pBar.style.width = pct + "%";
      if (vendidos >= 5000) { pBar.textContent = "¡Objetivo logrado!"; pBar.className = "progress-bar success"; } 
      else if (vendidos >= 2000) { pBar.textContent = pct + "%"; pBar.className = "progress-bar success"; } 
      else { pBar.textContent = pct + "%"; pBar.className = "progress-bar"; }
      
      document.getElementById("tVendidos").textContent = vendidos;
      document.getElementById("tTotal").textContent = data.kpis.total_tickets;
      document.getElementById("kDinero").textContent = "S/ " + data.kpis.total_dinero;
      document.getElementById("kPart").textContent = data.kpis.participantes;

      document.getElementById("listaRefs").innerHTML = bdParticipantes.map(p => `<option value="${p.celular}">${p.nombre}</option>`).join('');
      document.getElementById("tblMovs").innerHTML = [...bdParticipantes].reverse().map(p => `<tr><td>${p.nombre}</td><td style="text-align:right"><strong>${p.tkts}</strong> tkts</td></tr>`).join('');
      document.getElementById("tblParts").innerHTML = data.topParts.map(r => `<tr><td>${r[0]}</td><td style="text-align:right"><strong>${r[1]}</strong></td></tr>`).join('');
      document.getElementById("tblRefs").innerHTML = data.topRefs.map(r => `<tr><td>${r[0]}</td><td style="text-align:right; color:var(--ok);"><strong>+${r[1]}</strong></td></tr>`).join('');
    }

    document.getElementById('rowContainer').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
        e.preventDefault();
        const inputs = Array.from(document.querySelectorAll('#rowContainer input:not([disabled])'));
        const idx = inputs.indexOf(e.target);
        if (idx > -1 && idx < inputs.length - 1) inputs[idx + 1].focus();
        else if (idx === inputs.length - 1) document.getElementById('btnAddRow').click();
      }
    });

    document.getElementById('rowContainer').addEventListener('input', (e) => {
      if(e.target.classList.contains('i-cel')) {
        const row = e.target.closest('.form-row');
        const match = bdParticipantes.find(p => p.celular === e.target.value.trim());
        const info = row.querySelector('.info-text');
        const ref = row.querySelector('.i-ref');
        const nom = row.querySelector('.i-nom');
        
        if(match) {
          info.textContent = `Registrado. Se sumarán tickets.`;
          nom.value = match.nombre;
          ref.value = ""; ref.disabled = true;
        } else {
          info.textContent = "";
          ref.disabled = false;
        }
      }
    });

    document.getElementById('btnAddRow').addEventListener('click', () => {
      const row = document.createElement('div');
      row.className = 'form-row';
      row.innerHTML = `
        <div><label class="mobile-label">Nombres Completos</label><input type="text" class="i-nom" placeholder="Ej: Ana López" required></div>
        <div><label class="mobile-label">Celular</label><input type="tel" class="i-cel" placeholder="Ej: 912345678" required><span class="info-text"></span></div>
        <div><label class="mobile-label">N° Tickets</label><input type="number" class="i-tkt" min="1" placeholder="Ej: 2" required></div>
        <div>
          <label class="mobile-label">Referencia (Número)</label>
          <div style="display: flex; gap: 5px;">
            <input type="text" class="i-ref" list="listaRefs" placeholder="Opcional" autocomplete="off">
            <button type="button" class="btn-del" onclick="this.closest('.form-row').remove()" title="Eliminar participante">✖</button>
          </div>
        </div>
      `;
      document.getElementById('rowContainer').appendChild(row);
      row.querySelector('.i-nom').focus();
    });

    window.addEventListener("DOMContentLoaded", async () => {
      try { renderDashboard(await (await fetch(API)).json()); } catch (e) {}
    });

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btn");
      const msg = document.getElementById("msg");
      btn.disabled = true; btn.textContent = "Procesando..."; msg.className = "msg";

      const dataBatch = [];
      document.querySelectorAll('.form-row').forEach(row => {
        const nom = row.querySelector('.i-nom').value;
        const cel = row.querySelector('.i-cel').value;
        const tkt = row.querySelector('.i-tkt').value;
        const ref = row.querySelector('.i-ref').value;
        if(nom && cel && tkt) dataBatch.push({ nombre: nom, celular: cel, tickets: tkt, referencia: ref });
      });

      try {
        const res = await (await fetch(API, { method: "POST", body: JSON.stringify(dataBatch) })).json();
        msg.textContent = res.message;
        msg.className = "msg ok";
        renderDashboard(res); 
        
        document.getElementById('rowContainer').innerHTML = `
          <div class="form-row">
            <div><label class="mobile-label">Nombres Completos</label><input type="text" class="i-nom" placeholder="Ej: Juan Pérez" required></div>
            <div><label class="mobile-label">Celular</label><input type="tel" class="i-cel" placeholder="Ej: 987654321" required><span class="info-text"></span></div>
            <div><label class="mobile-label">N° Tickets</label><input type="number" class="i-tkt" min="1" placeholder="Ej: 5" required></div>
            <div><label class="mobile-label">Referencia (Número)</label><input type="text" class="i-ref" list="listaRefs" placeholder="Opcional" autocomplete="off"></div>
          </div>`;
      } catch {
        msg.textContent = "Error de conexión.";
        msg.className = "msg err";
      }
      btn.disabled = false; btn.textContent = "Procesar Registros";
    });
  </script>
</body>
</html>
