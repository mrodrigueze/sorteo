<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rifa A LA SUERTE</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f5f5f3; display: flex; flex-direction: column; align-items: center; padding: 2rem; gap: 1rem; }
    .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 14px; padding: 1.5rem; width: 100%; max-width: 420px; box-sizing: border-box; }
    h1, h2 { font-size: 18px; margin-top: 0; margin-bottom: 1rem; color: #333; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
    input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; margin-bottom: 1rem; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #185FA5; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
    button:disabled { opacity: 0.6; }
    .msg { margin-top: 1rem; padding: 12px; border-radius: 8px; font-size: 14px; display: none; }
    .ok { display: block; background: #EAF3DE; color: #3B6D11; }
    .err { display: block; background: #FCEBEB; color: #A32D2D; }
    .info { display: none; background: #e8f4fd; color: #0d4a82; padding: 8px; border-radius: 6px; font-size: 13px; margin-top: -10px; margin-bottom: 1rem; }
    
    .progress-container { width: 100%; background: #e0e0e0; border-radius: 8px; overflow: hidden; margin-bottom: 0.5rem; }
    .progress-bar { height: 22px; background: #28a745; width: 0%; text-align: center; color: white; font-size: 12px; line-height: 22px; transition: width 0.4s ease; font-weight: bold; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1rem; }
    .stat-box { background: #f9f9f9; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #eee; }
    .stat-val { font-size: 20px; font-weight: bold; color: #185FA5; }
    .stat-lbl { font-size: 12px; color: #666; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; font-size: 14px; }
    th, td { text-align: left; padding: 8px 4px; border-bottom: 1px solid #f0f0f0; }
  </style>
</head>
<body>

  <div class="card">
    <h2>📊 Avance de Meta</h2>
    <div class="progress-container"><div id="progressBar" class="progress-bar">0%</div></div>
    <div style="display: flex; justify-content: space-between; font-size: 12px; color: #555;">
      <span>Vendidos: <strong id="tVendidos">0</strong></span>
      <span>Total(Inc.Extra): <strong id="tTotal">0</strong></span>
      <span>Meta: <strong>5000</strong></span>
    </div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val" id="kDinero">S/ 0</div><div class="stat-lbl">Recaudado</div></div>
      <div class="stat-box"><div class="stat-val" id="kPart">0</div><div class="stat-lbl">Participantes</div></div>
    </div>
  </div>

  <div class="card">
    <h1>🎟️ Compra de Tickets</h1>
    <form id="form">
      <label>Celular</label>
      <input id="celular" type="tel" required>
      <div id="alertaExiste" class="info"></div>
      
      <label>Nombre completo</label>
      <input id="nombre" type="text" required>
      
      <label>Número de tickets</label>
      <input id="tickets" type="number" min="1" required>
      
      <label>Referencia (Busca por nombre o escribe el celular)</label>
      <input id="referencia" type="text" list="listaRefs" autocomplete="off">
      <datalist id="listaRefs"></datalist>
      
      <button id="btn" type="submit">Enviar solicitud</button>
    </form>
    <p id="msg" class="msg"></p>
  </div>

  <div class="card">
    <h2>🏆 Top Participantes</h2>
    <table id="tblParts"><tbody></tbody></table>
    <h2 style="margin-top: 1.5rem;">🥇 Top Referidores</h2>
    <table id="tblRefs"><tbody></tbody></table>
  </div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbxnlP7wv0GymtVjYxcW6ICQs6ekbAkT_DBs2_AwwNKFXrolmJ5e_XUIKe0jatYgB661IQ/exec"; // ¡REEMPLAZAR!
    let bdParticipantes = []; // Caché local

    function renderDashboard(data) {
      if (!data || !data.kpis) return;
      bdParticipantes = data.lista || [];
      
      const pct = Math.min((data.kpis.tickets_v / 5000) * 100, 100).toFixed(1);
      document.getElementById("progressBar").style.width = pct + "%";
      document.getElementById("progressBar").textContent = pct + "%";
      
      document.getElementById("tVendidos").textContent = data.kpis.tickets_v;
      document.getElementById("tTotal").textContent = data.kpis.total_tickets;
      document.getElementById("kDinero").textContent = "S/ " + data.kpis.total_dinero;
      document.getElementById("kPart").textContent = data.kpis.participantes;

      // Poblar datalist de referencias
      document.getElementById("listaRefs").innerHTML = bdParticipantes.map(p => 
        `<option value="${p.celular}">${p.nombre}</option>`
      ).join('');

      document.getElementById("tblParts").innerHTML = data.topParts.map(r => 
        `<tr><td>${r[0]}</td><td style="text-align:right"><strong>${r[1]}</strong></td></tr>`).join('');
        
      document.getElementById("tblRefs").innerHTML = data.topRefs.map(r => 
        `<tr><td>${r[0]}</td><td style="text-align:right; color:#28a745;"><strong>+${r[1]}</strong></td></tr>`).join('');
    }

    // Detector de celular recurrente
    document.getElementById("celular").addEventListener("input", (e) => {
      const cel = e.target.value.trim();
      const match = bdParticipantes.find(p => p.celular === cel);
      const alerta = document.getElementById("alertaExiste");
      const inputNombre = document.getElementById("nombre");
      
      if(match) {
        alerta.style.display = "block";
        alerta.textContent = `✅ Registrado como ${match.nombre}. Se sumarán los tickets a su cuenta.`;
        inputNombre.value = match.nombre;
      } else {
        alerta.style.display = "none";
      }
    });

    window.addEventListener("DOMContentLoaded", async () => {
      try { renderDashboard(await (await fetch(API)).json()); } catch (e) {}
    });

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btn");
      const msg = document.getElementById("msg");
      btn.disabled = true; btn.textContent = "Procesando..."; msg.className = "msg";

      try {
        const res = await (await fetch(API, {
          method: "POST",
          body: JSON.stringify({
            nombre: document.getElementById("nombre").value,
            celular: document.getElementById("celular").value,
            tickets: document.getElementById("tickets").value,
            referencia: document.getElementById("referencia").value
          }),
        })).json();
        
        msg.textContent = res.message;
        msg.className = "msg ok";
        renderDashboard(res); 
        e.target.reset();
        document.getElementById("alertaExiste").style.display = "none";
      } catch {
        msg.textContent = "Error al conectar.";
        msg.className = "msg err";
      }
      btn.disabled = false; btn.textContent = "Enviar solicitud";
    });
  </script>
</body>
</html>
