<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Rifa 2026</title>
  <style>
    body   { font-family: system-ui, sans-serif; background: #f5f5f3; display: flex; justify-content: center; padding: 2rem; }
    .card  { background: #fff; border: 1px solid #e5e5e5; border-radius: 14px; padding: 2rem; width: 100%; max-width: 420px; }
    h1     { font-size: 20px; margin-bottom: 1.5rem; }
    label  { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
    input  { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; margin-bottom: 1rem; }
    button { width: 100%; padding: 12px; background: #185FA5; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
    button:disabled { opacity: 0.6; }
    .msg   { margin-top: 1rem; padding: 12px; border-radius: 8px; font-size: 14px; display: none; }
    .ok    { display: block; background: #EAF3DE; color: #3B6D11; }
    .err   { display: block; background: #FCEBEB; color: #A32D2D; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎟️ Compra de Tickets</h1>
    <form id="form">
      <label>Nombre completo</label>
      <input id="nombre" type="text" required>
      <label>Celular</label>
      <input id="celular" type="tel" required>
      <label>Número de tickets</label>
      <input id="tickets" type="number" min="1" required>
      <button id="btn">Enviar solicitud</button>
    </form>
    <p id="msg" class="msg"></p>
  </div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycby1WS6UaGuVeRyK7tMCKoPJM1mnQzfhPiR87gIBOvWJlib4VA4qTLy557X884QVRMDxZw/exec";
    const btn = document.getElementById("btn");
    const msg = document.getElementById("msg");

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = "Enviando...";

      try {
        await fetch(API, {
          method: "POST",
          body: JSON.stringify({
            nombre:  document.getElementById("nombre").value,
            celular: document.getElementById("celular").value,
            tickets: document.getElementById("tickets").value,
          }),
        });
        msg.textContent = "¡Listo! Datos enviados correctamente.";
        msg.className = "msg ok";
        e.target.reset();
      } catch {
        msg.textContent = "Error al enviar. Intenta nuevamente.";
        msg.className = "msg err";
      }

      btn.disabled = false;
      btn.textContent = "Enviar solicitud";
    });
  </script>
</body>
</html>
